<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/sign_up.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <div id="emblem">
        <img id="logo" src="./pic/logo.svg" alt="logo">
    </div>
    <div id="log_in">
        <h1>Sign up</h1>

        <div id="input_box">
            <input type="text" id="name" placeholder=" Username">
            <input type="email" id="email" placeholder=" Email">
            <input type="text" id="password" placeholder=" Password">
            <input type="text" id="repeat_password" placeholder=" Reapet password">
            <button type="button" id="register">SIGN UP</button>
        </div>
        <div>
            <div id="check">
                <div id="remember">
                    <div>
                        <input type="checkbox" id="checkbox">
                        <label>Remember me</label>
                    </div>
                    <a id="help" href="">Need help?</a>
                </div>
                <div>
                    <div>
                        <input type="checkbox" id="child_mode">
                        <label>Child mode account</label>
                    </div>
                </div>
            </div>
        </div>
        <div id="inform">
            <div id="sign_up">
                <h5>Alredy has Netflix?</h5>
                <h5><a id="sign_page" href="./index.html">Sign in now</a></h5>
            </div>
                <h6 id="warning">This page is protected by Google ME to ensure you`re not a bot.
                    <a id="learn_page" href="">Learn more.</a>
                </h6>
        </div>
    </div>
</body>
</html>
